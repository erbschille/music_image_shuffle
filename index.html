<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Shuffle Viewer</title>

  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      cursor: pointer;
      user-select: none;
    }

    img {
      max-width: 100vw;
      max-height: 100vh;
      object-fit: contain;
    }

    .hint {
      position: fixed;
      bottom: 10px;
      color: #aaa;
      font-family: sans-serif;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <img id="viewer" src="" />
  <div class="hint">Click anywhere for next image</div>

  <script>
    // 1. LIST YOUR IMAGES HERE (from /images folder in repo)
    const imageBank = [
     "1.png"
"2.png"
"3.png"
"4.png"
"5.png"
"6.png"
"7.png"
"8.png"
"9.png"
"10.png"
"11.png"
"12.png"
"13.png"
"14.png"
"15.png"
"16.png"
"17.png"
"18.png"
"19.png"
"20.png"
"21.png"
"22.png"
"23.png"
"24.png"
"25.png"
"26.png"
"27.png"
"28.png"
"29.png"
"30.png"
"31.png"
"32.png"
"33.png"
"34.png"
"35.png"
"36.png"
"37.png"
    ];

    // 2. Shuffle function
    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    let shuffled = shuffle([...imageBank]);
    let index = 0;

    const imgEl = document.getElementById("viewer");

    function showImage() {
  imgEl.src = "images/" + encodeURIComponent(shuffled[index]);
}

    function nextImage() {
      index++;

      if (index >= shuffled.length) {
        shuffled = shuffle([...imageBank]);
        index = 0;
      }

      showImage();
    }

    document.body.addEventListener("click", nextImage);

    showImage();
  </script>

</body>
</html>
